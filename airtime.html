</div>

<div class="hidden sm:block flex-1">
<p class="text-xs text-slate-500 dark:text-slate-400 font-medium uppercase">Total Amount</p>
<p class="text-2xl font-black text-primary" id="summaryTotal">₦0.00</p>
</div>
<button class="w-full sm:w-[280px] h-14 bg-primary text-white text-lg font-bold rounded-xl shadow-lg shadow-primary/30 hover:bg-primary/90 active:scale-95 transition-all flex items-center justify-center gap-2 group">
<span>Continue</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">trending_flat</span>
</button>
</div>
</footer>

<script>
        let selectedNetwork = '';
        let currentAmount = 0;

        function selectNetwork(element, name) {
            document.querySelectorAll('.network-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            selectedNetwork = name;
            updateSummary();
        }

        function setAmount(val) {
            document.getElementById('amountInput').value = val;
            updateSummary();
            
            // Visual feedback on grid buttons
            document.querySelectorAll('.amount-btn').forEach(btn => {
                if(btn.innerText === '₦' + val.toLocaleString()) {
                    btn.classList.add('border-primary', 'bg-primary/5');
                } else {
                    btn.classList.remove('border-primary', 'bg-primary/5');
                }
            });
        }

        function updateSummary() {
            const amount = parseFloat(document.getElementById('amountInput').value) || 0;
            const cashback = amount * 0.02;
            const total = amount;

            document.getElementById('summaryNetwork').innerText = selectedNetwork || '—';
            document.getElementById('summaryCashback').innerText = '₦' + cashback.toFixed(2);
            document.getElementById('summaryTotal').innerText = '₦' + total.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }
    </script>
