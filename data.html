<option value="5000">10 GB - 30 Days - ₦5,000 (Best Value)</option>

<script>
    const dataPlans = {
        daily: [
            { value: '100', text: '100 MB - 1 Day - ₦100' },
            { value: '200', text: '200 MB - 1 Day - ₦200' },
            { value: '500', text: '1 GB - 1 Day - ₦500' }
        ],
        weekly: [
            { value: '1000', text: '1 GB - 7 Days - ₦1,000' },
            { value: '2000', text: '2.5 GB - 7 Days - ₦2,000' },
            { value: '4000', text: '6 GB - 7 Days - ₦4,000' }
        ],
        monthly: [
            { value: '1000', text: '1.5 GB - 30 Days - ₦1,000 (Hot Seller)' },
            { value: '2000', text: '3.5 GB - 30 Days - ₦2,000 (Popular)' },
            { value: '5000', text: '10 GB - 30 Days - ₦5,000 (Best Value)' },
            { value: '8000', text: '20 GB - 30 Days - ₦8,000' },
            { value: '15000', text: '40 GB - 30 Days - ₦15,000' },
            { value: '30000', text: '80 GB - 30 Days - ₦30,000' }
        ]
    };

    const tabs = ['tab-daily', 'tab-weekly', 'tab-monthly'];
    const select = document.getElementById('data-plan-select');
    const totalDisplay = document.getElementById('total-amount-display');

    const updateTabs = (activeId) => {
        tabs.forEach(id => {
            const el = document.getElementById(id);
            if (id === activeId) {
                el.classList.add('bg-white', 'dark:bg-slate-700', 'text-primary', 'shadow-sm');
                el.classList.remove('text-slate-500', 'dark:text-slate-400');
            } else {
                el.classList.remove('bg-white', 'dark:bg-slate-700', 'text-primary', 'shadow-sm');
                el.classList.add('text-slate-500', 'dark:text-slate-400');
            }
        });
    };

    const updateOptions = (period) => {
        const plans = dataPlans[period];
        select.innerHTML = '<option value="">Select a plan</option>';
        plans.forEach(plan => {
            const opt = document.createElement('option');
            opt.value = plan.value;
            opt.textContent = plan.text;
            select.appendChild(opt);
        });
        totalDisplay.textContent = '₦0.00';
    };

    document.getElementById('tab-daily').onclick = () => { updateTabs('tab-daily'); updateOptions('daily'); };
    document.getElementById('tab-weekly').onclick = () => { updateTabs('tab-weekly'); updateOptions('weekly'); };
    document.getElementById('tab-monthly').onclick = () => { updateTabs('tab-monthly'); updateOptions('monthly'); };

    select.onchange = (e) => {
        const val = e.target.value;
        if (val) {
            totalDisplay.textContent = `₦${Number(val).toLocaleString()}.00`;
        } else {
            totalDisplay.textContent = '₦0.00';
        }
    };

    document.getElementById('self-fill-btn').addEventListener('click', () => {
        const phoneInput = document.getElementById('phone-input');
        phoneInput.value = '801 234 5678';
        // Trigger change event if there are other listeners
        phoneInput.dispatchEvent(new Event('input'));
    });</script></body></html>
